<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
    }
    h1 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #536471;
      margin-bottom: 14px;
    }
    .divider { height: 1px; background: #2f3336; margin: 10px 0; }

    /* Cult list */
    .cult-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .cult-info { display: flex; align-items: center; gap: 10px; flex: 1; }
    .cult-dot {
      width: 10px; height: 10px;
      border-radius: 50%; flex-shrink: 0;
    }
    .cult-label { display: flex; flex-direction: column; }
    .cult-name { font-size: 13px; font-weight: 600; }
    .cult-desc { font-size: 11px; color: #71767b; }

    /* Toggle */
    .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; cursor: pointer;
      inset: 0; background: #38444d; border-radius: 22px;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute; left: 3px; top: 3px;
      width: 16px; height: 16px;
      background: #e7e9ea; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider::before { transform: translateX(16px); }

    /* Stats */
    .stats { display: flex; justify-content: space-between; padding: 4px 0; }
    .stat-label { font-size: 12px; color: #71767b; }
    .stat-value { font-size: 12px; font-weight: 600; }

    .footer {
      font-size: 11px; color: #536471;
      margin-top: 8px; line-height: 1.4;
    }

    .clear-btn {
      width: 100%;
      padding: 6px 0;
      background: none;
      border: 1px solid #38444d;
      border-radius: 6px;
      color: #71767b;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .clear-btn:hover {
      color: #e7e9ea;
      border-color: #e7e9ea;
    }

    .empty-state {
      font-size: 12px; color: #536471;
      text-align: center; padding: 12px 0;
      font-style: italic;
    }

    /* Threshold slider */
    .threshold-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0 6px 20px;
    }
    .threshold-row label {
      font-size: 11px;
      color: #71767b;
      white-space: nowrap;
    }
    .threshold-row input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #38444d;
      border-radius: 2px;
      outline: none;
    }
    .threshold-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e7e9ea;
      cursor: pointer;
    }
    .threshold-row .threshold-val {
      font-size: 11px;
      font-weight: 600;
      min-width: 28px;
      text-align: right;
    }

    /* Allowlist */
    .allowlist-section { margin-top: 2px; }
    .allowlist-input-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .allowlist-input-row input {
      flex: 1;
      background: #1e2a35;
      border: 1px solid #38444d;
      border-radius: 6px;
      color: #e7e9ea;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }
    .allowlist-input-row input:focus {
      border-color: #536471;
    }
    .allowlist-add-btn {
      background: none;
      border: 1px solid #38444d;
      border-radius: 6px;
      color: #71767b;
      width: 28px;
      font-size: 14px;
      cursor: pointer;
    }
    .allowlist-add-btn:hover {
      color: #e7e9ea;
      border-color: #e7e9ea;
    }
    .allowlist-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .allowlist-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #1e2a35;
      border: 1px solid #38444d;
      border-radius: 9999px;
      padding: 2px 8px;
      font-size: 11px;
      color: #e7e9ea;
    }
    .allowlist-tag button {
      background: none;
      border: none;
      color: #71767b;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      line-height: 1;
    }
    .allowlist-tag button:hover { color: #ef4444; }
  </style>
</head>
<body>
  <h1>Cult blocker</h1>
  <p class="subtitle">Hide posts from cult PFP accounts on X</p>

  <div id="cultList"></div>

  <div class="divider"></div>

  <div class="stats">
    <span class="stat-label">Cached PFPs</span>
    <span class="stat-value" id="cacheCount">-</span>
  </div>
  <div class="stats">
    <span class="stat-label">Posts hidden (this tab)</span>
    <span class="stat-value" id="hiddenCount">-</span>
  </div>

  <div class="divider"></div>

  <button id="clearCache" class="clear-btn">Clear cache</button>

  <div class="divider"></div>

  <div class="allowlist-section">
    <span class="stat-label">Allowlisted accounts</span>
    <div class="allowlist-input-row">
      <input type="text" id="allowlistInput" placeholder="@username" spellcheck="false">
      <button id="allowlistAdd" class="allowlist-add-btn">+</button>
    </div>
    <div id="allowlistTags" class="allowlist-tags"></div>
  </div>

  <div class="footer">
    MobileCLIP centroid classifier.
  </div>

  <script src="cults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
